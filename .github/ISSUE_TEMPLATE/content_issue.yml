name: Content issue
description: Report a typo, unclear explanation, or incorrect information
labels: ["content"]
body:
  - type: input
    id: section
    attributes:
      label: Section or page
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: What is the issue?
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested fix (optional)
